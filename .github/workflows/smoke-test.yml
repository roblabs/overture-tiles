# Smoke Test
# Builds the Docker image and runs a small bbox test for each theme matrix entry.
# Verifies that the output PMTiles file is created and non-trivially sized.
#
# Test locally with act (requires Docker, ~18 GB runner image on first pull):
#   act workflow_dispatch -j smoke-test --matrix theme:places \
#       -P ubuntu-latest=catthehacker/ubuntu:full-latest


# https://github.com/extractions/setup-just ?

name: Smoke Test

on:
  push:
  pull_request:
    paths:
      - Dockerfile
      - run.sh
      - bbox.sh
      - scripts/**
      - profiles/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [places, divisions]

    permissions:
      contents: read

    steps:
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 #v4
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t overture-tiles:ci .

      - name: Get latest Overture release
        id: release
        run: |
          RELEASE=$(curl -s https://stac.overturemaps.org/catalog.json \
            | jq -r '.links[] | select(.rel=="child" and .title=="Latest Overture Release") | .href | ltrimstr("./") | split("/")[0]')
          echo "version=${RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Run smoke test (${{ matrix.theme }})
        env:
          THEME: ${{ matrix.theme }}
          RELEASE: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p output
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/output:/data" \
            -e THEME="${THEME}" \
            -e RELEASE="${RELEASE}" \
            -e OUTPUT=/data/ \
            -e SKIP_UPLOAD=true \
            -e BBOX="-122.45,47.55,-122.25,47.65" \
            overture-tiles:ci

      - name: Verify output
        env:
          THEME: ${{ matrix.theme }}
        run: |
          OUTPUT_FILE="output/${THEME}.pmtiles"
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "ERROR: $OUTPUT_FILE not found"
            exit 1
          fi
          SIZE=$(stat -c%s "$OUTPUT_FILE")
          echo "$OUTPUT_FILE: ${SIZE} bytes"
          if [ "$SIZE" -lt 1024 ]; then
            echo "ERROR: output file suspiciously small (${SIZE} bytes)"
            exit 1
          fi
